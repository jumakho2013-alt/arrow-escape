// Surface any uncaught error visibly — without this a JS error gives a blank
// white screen with no clue. Persists in localStorage for post-mortem.
window.addEventListener('error', function(e){
  try{
    localStorage.setItem('ae_lasterror', (e.message||'?')+' @ '+(e.filename||'?')+':'+(e.lineno||'?')+':'+(e.colno||'?'));
    var div=document.createElement('div');
    div.style.cssText='position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;font:12px monospace;padding:10px;z-index:99999;white-space:pre-wrap';
    div.textContent='JS ERROR: '+(e.message||'?')+'\n@ '+(e.filename||'?')+':'+(e.lineno||'?');
    document.body.appendChild(div);
  }catch(_){}
});
window.addEventListener('unhandledrejection', function(e){
  try{ localStorage.setItem('ae_lastreject', String(e.reason||'?')); }catch(_){}
});

// Polyfill CanvasRenderingContext2D.roundRect for iOS 15.x and 16.0–16.3
// (only available natively in 16.4+). Without this the app instantly throws
// "X.roundRect is not a function" → white screen on older devices. Apple
// still allows iOS 15 in the App Store, so we ship the polyfill.
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];
    else if(r.length===1)r=[r[0],r[0],r[0],r[0]];
    else if(r.length===2)r=[r[0],r[1],r[0],r[1]];
    const [tl,tr,br,bl]=r;
    this.moveTo(x+tl,y);
    this.arcTo(x+w,y,   x+w,y+h, tr);
    this.arcTo(x+w,y+h, x,  y+h, br);
    this.arcTo(x,  y+h, x,  y,   bl);
    this.arcTo(x,  y,   x+w,y,   tl);
    this.closePath();
    return this;
  };
}

function _readSafeArea(){
  try{
    let probe=document.getElementById('_sap');
    if(!probe){
      probe=document.createElement('div');
      probe.id='_sap';
      probe.style.cssText='position:fixed;top:0;left:0;width:0;height:0;visibility:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)';
      document.body.appendChild(probe);
    }
    const cs=getComputedStyle(probe);
    return {
      t:parseFloat(cs.paddingTop)||0,
      r:parseFloat(cs.paddingRight)||0,
      b:parseFloat(cs.paddingBottom)||0,
      l:parseFloat(cs.paddingLeft)||0
    };
  }catch(e){return {t:0,r:0,b:0,l:0}}
}
function resize(){
  dpr=window.devicePixelRatio||1;
  // Hybrid layout. Two regimes:
  //   1) Phones (aspect close to 390:844, ±25%): canvas fills the entire
  //      viewport edge-to-edge — the gradient bg reaches under the notch,
  //      no visible body strip. The slight stretch on phones with non-spec
  //      aspect (SE, etc.) is imperceptible.
  //   2) Tablets / desktop / strongly off-spec aspect (>25% diff): canvas
  //      keeps the 390:844 ratio with letterbox bars on the sides. On iPad
  //      portrait that means a centered "phone-shaped" board; on iPad
  //      landscape the same shape sits in the middle. The letterbox area
  //      shows the dot pattern from body bg, so the empty space reads as
  //      a deliberate frame instead of an obvious crop.
  const winW=innerWidth||W,winH=innerHeight||H;
  const wantRatio=W/H;
  const winRatio=winW/winH;
  const aspectDelta=Math.abs(winRatio-wantRatio)/wantRatio;
  let cw,ch;
  if(aspectDelta>.25){
    document.body.classList.add('letterboxed');
    // Strict 390:844 letterbox on tablet — canvas centered with side bars.
    // The earlier "stretch to 0.62" experiment filled more iPad screen but
    // broke iPhone proportions and made game elements look squashed; the
    // user prefers the original look with side bars.
    if(winRatio>wantRatio){ch=winH;cw=ch*wantRatio}
    else{cw=winW;ch=cw/wantRatio}
  }else{
    document.body.classList.remove('letterboxed');
    cw=winW;ch=winH;
  }
  C.width=W*dpr;C.height=H*dpr;
  C.style.width=cw+'px';C.style.height=ch+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
  scaleY=ch/H||1;
  const sa=_readSafeArea();
  safeTop   =sa.t/scaleY;
  safeBottom=sa.b/scaleY;
  safeLeft  =sa.l/((cw/W)||1);
  safeRight =sa.r/((cw/W)||1);
  _bgCacheDirty=true;
}

//  AUDIO — Web Audio API (NOT HTML5 <audio>).
// iOS WKWebView treats any HTMLAudioElement as media playback: it hijacks
// AVAudioSession, registers the app on the lock-screen Now Playing widget,
// and routes playback through the codec path (high latency). Web Audio is
// classified as in-app sound, plays through the ambient/mixWithOthers
// category set in AppDelegate, has near-zero latency, and never touches
// Now Playing. The AVAudioSession config in AppDelegate.swift only actually
// takes effect once we stop instantiating <audio>.
// ================================================================

function initA(){
  // Must be called from a user-gesture handler on iOS to unlock the context.
  if(audioCtx){
    if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
    return;
  }
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    audioCtx=new Ctx();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=SND_VOL;
    masterGain.connect(audioCtx.destination);
    // Decode any buffers fetched before the context existed.
    for(const item of _pendingDecode)_decodeInto(item.name,item.buf);
    _pendingDecode.length=0;
  }catch(e){}
}

// Fetch at startup so bytes are in memory by the time the user taps.
// Decoding waits for the context (created on first tap).
const _pendingDecode=[];
function _decodeInto(name,buf){
  if(!audioCtx)return;
  // decodeAudioData on iOS Safari needs a fresh copy because the ArrayBuffer
  // is detached after the call. We already hold one reference so just pass it.
  audioCtx.decodeAudioData(buf,b=>{sndBuf[name]=b},()=>{});
}
function loadSnd(name,src){
  fetch(src).then(r=>r.arrayBuffer()).then(buf=>{
    if(audioCtx)_decodeInto(name,buf);
    else _pendingDecode.push({name,buf});
  }).catch(()=>{});
}

function playSnd(name){
  if(!sndOn||!audioCtx||!sndBuf[name])return;
  const go=()=>{
    try{
      const src=audioCtx.createBufferSource();
      src.buffer=sndBuf[name];
      src.connect(masterGain);
      src.start(0);
    }catch(e){}

  // If iOS suspended the context (app backgrounded, inactivity), resume is
  // async — we must wait for it to complete before scheduling the buffer,
  // otherwise the first post-toggle play silently drops.
  if(audioCtx.state==='suspended')audioCtx.resume().then(go).catch(()=>{});
  else go();

// ================================================================
//  AUTO-UPDATE CHECK
// Polls Apple's iTunes lookup API once per day to detect a newer App Store
// version. iOS auto-update is on by default for most users, but ~30% have
// it off OR are on cellular and it lags days. A small in-menu nudge gets
// critical fixes (AdMob, anti-farm) deployed faster.
// Android equivalent (Play Store) has no public lookup API — skipped there.
// ================================================================
let availableUpdate=null; // version string like "1.0.12" if newer is live
function _semverGt(a,b){
  const ap=a.split('.').map(n=>+n||0);
  const bp=b.split('.').map(n=>+n||0);
  for(let i=0;i<max(ap.length,bp.length);i++){
    if((ap[i]||0)>(bp[i]||0))return true;
    if((ap[i]||0)<(bp[i]||0))return false;
  }
  return false;
}
async function checkForUpdate(){
  // Only iOS — Android has no equivalent simple endpoint
  if(typeof Capacitor!=='undefined'&&Capacitor.getPlatform&&Capacitor.getPlatform()==='android')return;
  // 24h cache so we don't hammer iTunes on every launch
  const myVersion=APP_VERSION.replace(/^v/,'');
  const lastCheck=+localStorage.getItem('ae_update_check')||0;
  if(Date.now()-lastCheck<24*3600*1000){
    const cached=localStorage.getItem('ae_update_avail');
    // Bug fix: previously loaded cached value blindly. After the user
    // upgrades to the cached version, the banner kept showing because
    // we never re-compared. Only honor the cache if it's STRICTLY newer
    // than the running build; otherwise clear it.
    if(cached&&_semverGt(cached,myVersion)){
      availableUpdate=cached;
    }else if(cached){
      try{localStorage.removeItem('ae_update_avail')}catch(e){}
    }
    return;
  }
  try{
    const r=await fetch('https://itunes.apple.com/lookup?bundleId=strayarrows.puzzle');
    const data=await r.json();
    const storeVersion=data.results&&data.results[0]&&data.results[0].version;
    if(storeVersion&&_semverGt(storeVersion,myVersion)){
      availableUpdate=storeVersion;
      try{localStorage.setItem('ae_update_avail',storeVersion)}catch(e){}
    }else{
      try{localStorage.removeItem('ae_update_avail')}catch(e){}
    }
    try{localStorage.setItem('ae_update_check',String(Date.now()))}catch(e){}
  }catch(e){/* offline / blocked / iTunes lag — silent */}
}
// Defer so it doesn't compete with first-render or AdMob init
setTimeout(checkForUpdate,3000);
function openAppStore(){
  // window.open redirects iOS to the App Store app via apps.apple.com URL
  try{window.open(APP_STORE_URL,'_blank')}catch(e){}
}

// ================================================================
//  INPUT — single-tap, pinch-zoom and pan
// ================================================================
// Architecture:
//   - Existing tap behavior (drawBtn, arrow tap) keeps screen-logical coords.
//   - On the Play screen the grid + arrows section is wrapped in
//     ctx.save/translate/scale/restore so the canvas itself zooms — pixels
//     stay crisp because we re-rasterize each frame at the new transform.
//   - Arrow tap detection inverts the transform via _screenToWorld() so
//     touches still hit the right arrow no matter how the player pans/zooms.
//   - UI elements (top bar, hint/skip, gear) are drawn OUTSIDE the transform
//     block — they don't zoom and stay readable.
let tapX=0,tapY=0,tapped=false,mx=W/2,my=H/2;
let lastClick=null; // {x,y,t} for button press scale feedback

// Zoom state (Play screen only, reset on each generateLevel)
let zoomLevel=1, panX=0, panY=0;
const MIN_ZOOM=1, MAX_ZOOM=2.5;

// Pinch state — set on 2-finger touchstart, cleared on touchend.
let _pinchStartDist=0;
let _pinchStartZoom=1;
let _pinchStartMid=null;   // {x,y} screen-coord midpoint at gesture start
let _pinchStartWorld=null; // {x,y} world-coord point under that midpoint
let _pinchStartPan=null;   // {x,y} pan at gesture start

// 1-finger tap tracking. Tap fires on touchend if total movement stays
// within TAP_THRESHOLD. If movement exceeds threshold AND zoom is engaged
// (>1), the gesture promotes to a 1-finger pan via _onePanLast — the user
// can grab anywhere (arrow OR empty cell) and drag to scroll, exactly
// like Maps. At zoom=1 we keep the original "drag cancels tap" rule so
// a swipe never accidentally activates an arrow under the start point.
let _tapStart=null;        // {x,y,t} when 1-finger touch begins
let _onePanLast=null;      // {x,y} previous touchmove position during 1-finger pan
const TAP_THRESHOLD=10;    // px — drag beyond this cancels the tap

// Pivot for zoom is the GRID's geometric center, not the screen's. The grid
// sits above the screen midpoint (top edge ~y=127, bottom ~y=480 on level 50),
// so a screen-center pivot threw the grid further off-screen as the user
// zoomed in — could not pan back to see the top edge. Grid-center pivot
// keeps the grid anchored at its own middle and lets the player pan to
// either edge symmetrically.
function _gridCenter(){
  const cs=getCellSize();
  return{
    x:getGridX()+gridCols*cs/2,
    y:getGridY()+gridRows*cs/2,
  };
}

function _clampPan(){
  // At zoom=1 there's nothing to pan — lock to default to avoid the grid
  // sliding around aimlessly when the player two-fingers without spreading.
  if(zoomLevel<=1.001){panX=0;panY=0;return;}
  const cs=getCellSize();
  const gx=getGridX(),gy=getGridY();
  const gridW=gridCols*cs,gridH=gridRows*cs;
  const c=_gridCenter();
  // The user wanted to be able to drag any edge of the grid all the way to
  // the CENTER of the viewport (not merely to the viewport edge), plus a
  // little overshoot — so they can comfortably aim a corner arrow without
  // the header or hint bar occluding it. Pan range = "edge at center" plus
  // a 12% overshoot of viewport size on each side.
  const overshootY=H*.12,overshootX=W*.12;
  // Forward (grid-center pivot):
  //   screenY = panY + c.y + (worldY - c.y) * zoom
  // Pan that puts grid TOP at H/2 (+overshoot below):
  const panY_topAtMid=H/2+overshootY-c.y-(gy-c.y)*zoomLevel;
  // Pan that puts grid BOT at H/2 (-overshoot above):
  const panY_botAtMid=H/2-overshootY-c.y-(gy+gridH-c.y)*zoomLevel;
  panY=clp(panY,Math.min(panY_topAtMid,panY_botAtMid),Math.max(panY_topAtMid,panY_botAtMid));
  const panX_leftAtMid=W/2+overshootX-c.x-(gx-c.x)*zoomLevel;
  const panX_rightAtMid=W/2-overshootX-c.x-(gx+gridW-c.x)*zoomLevel;
  panX=clp(panX,Math.min(panX_leftAtMid,panX_rightAtMid),Math.max(panX_leftAtMid,panX_rightAtMid));
}

// Convert a screen-space point (logical W/H coords from gp()) to world-space
// accounting for the active pan+zoom transform around the grid. Inverse of
// translate(c.x+panX, c.y+panY) → scale(z,z) → translate(-c.x,-c.y).
function _screenToWorld(sx,sy){
  if(zoomLevel===1&&panX===0&&panY===0)return{x:sx,y:sy};
  const c=_gridCenter();
  return{
    x:(sx-panX-c.x)/zoomLevel+c.x,
    y:(sy-panY-c.y)/zoomLevel+c.y,
  };
}

function gp(e){
  const r=C.getBoundingClientRect(),t=e.touches?e.touches[0]||e.changedTouches[0]:e;
  return{x:(t.clientX-r.left)/r.width*W,y:(t.clientY-r.top)/r.height*H};
}
function _gpTouch(t){
  const r=C.getBoundingClientRect();
  return{x:(t.clientX-r.left)/r.width*W,y:(t.clientY-r.top)/r.height*H};
}

// Mouse — desktop testing only; tap fires on mouseup if movement was small.
// No mouse drag for pan (would conflict with 1-finger tap rule). Wheel +
// Cmd/Ctrl zooms the grid for desktop test.
C.addEventListener('mousedown',e=>{
  initA();
  const p=gp(e);
  _tapStart={x:p.x,y:p.y,t:gt};
  mx=p.x;my=p.y;
  lastClick={x:p.x,y:p.y,t:gt};
});
C.addEventListener('mousemove',e=>{
  const p=gp(e);mx=p.x;my=p.y;
});
C.addEventListener('mouseup',e=>{
  if(!_tapStart)return;
  const p=gp(e);
  const dx=p.x-_tapStart.x,dy=p.y-_tapStart.y;
  if(Math.hypot(dx,dy)<TAP_THRESHOLD){
    tapX=p.x;tapY=p.y;tapped=true;
  }
  _tapStart=null;
});
C.addEventListener('wheel',e=>{
  if(!(e.ctrlKey||e.metaKey))return;
  e.preventDefault();
  zoomLevel=clp(zoomLevel-e.deltaY*.005,MIN_ZOOM,MAX_ZOOM);
  _clampPan();
},{passive:false});

// Touch — strict separation:
//   1 finger: tap on lift if movement < TAP_THRESHOLD. NO pan.
//   2 fingers: pinch (zoom around finger midpoint) + pan (midpoint moves).
//              Both happen simultaneously — natural Maps-app feel.
C.addEventListener('touchstart',e=>{
  e.preventDefault();initA();
  if(e.touches.length===2){
    // Pinch+pan start — record fingers' midpoint, distance, current zoom/pan,
    // and the WORLD coord under the midpoint. While the gesture runs we
    // pin that world point under the midpoint, so the area the user grabbed
    // stays under their fingers as zoom/pan change (canonical pinch-zoom
    // behavior — same as Maps, Photos).
    const p1=_gpTouch(e.touches[0]),p2=_gpTouch(e.touches[1]);
    _pinchStartDist=Math.hypot(p2.x-p1.x,p2.y-p1.y);
    _pinchStartZoom=zoomLevel;
    const midX=(p1.x+p2.x)/2,midY=(p1.y+p2.y)/2;
    _pinchStartMid={x:midX,y:midY};
    _pinchStartWorld=_screenToWorld(midX,midY);
    _pinchStartPan={x:panX,y:panY};
    _tapStart=null; // 2 fingers down → not a tap, ever
    return;
  }
  // 1 finger — record tap candidate. tapped=false until lift confirms small
  // movement (so a swipe doesn't accidentally hit an arrow under the start
  // point).
  const p=gp(e);
  _tapStart={x:p.x,y:p.y,t:gt};
  mx=p.x;my=p.y;
  lastClick={x:p.x,y:p.y,t:gt};
},{passive:false});

C.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2&&_pinchStartMid){
    // Pinch+pan update
    const p1=_gpTouch(e.touches[0]),p2=_gpTouch(e.touches[1]);
    const d=Math.hypot(p2.x-p1.x,p2.y-p1.y);
    const midX=(p1.x+p2.x)/2,midY=(p1.y+p2.y)/2;
    // 1) Update zoom from finger spread
    if(_pinchStartDist>0){
      zoomLevel=clp(_pinchStartZoom*d/_pinchStartDist,MIN_ZOOM,MAX_ZOOM);
    }
    // 2) Pin the world-point that was under the initial midpoint to the
    // current midpoint. Forward (grid-center pivot):
    //   screenX = panX + c.x + (worldX - c.x) * zoom
    // Solve panX so worldX=_pinchStartWorld.x lands at screen midX:
    const c=_gridCenter();
    panX=midX-c.x-(_pinchStartWorld.x-c.x)*zoomLevel;
    panY=midY-c.y-(_pinchStartWorld.y-c.y)*zoomLevel;
    _clampPan();
    return;
  }
  // 1-finger move. When zoom is in (>1) and the finger has moved past
  // the tap threshold, treat further motion as a one-finger pan — natural
  // map-app behaviour the user requested. While zoom=1 there's nothing to
  // pan, so we keep the original "drag cancels tap" semantics so a swipe
  // never accidentally fires an arrow tap under the start point.
  const p=gp(e);
  if(_tapStart){
    const dx=p.x-_tapStart.x,dy=p.y-_tapStart.y;
    if(Math.hypot(dx,dy)>TAP_THRESHOLD){
      _tapStart=null;
      if(zoomLevel>1.001){
        // Promote to a 1-finger pan. _onePanLast keeps the previous
        // touchmove position so we can apply incremental deltas; without
        // it the canvas would jump by the full from-touchstart delta on
        // the first move and feel jittery.
        _onePanLast={x:p.x,y:p.y};
      }
    }
  }else if(_onePanLast){
    // Active 1-finger pan — apply delta from previous position.
    panX+=p.x-_onePanLast.x;
    panY+=p.y-_onePanLast.y;
    _onePanLast={x:p.x,y:p.y};
    _clampPan();
  }
  mx=p.x;my=p.y;
},{passive:false});

C.addEventListener('touchend',e=>{
  if(e.touches.length===0&&_tapStart){
    // Only fire tap on lift if movement stayed within threshold and no pinch
    // ever started (touchstart with 2 fingers nulls _tapStart).
    const r=C.getBoundingClientRect();
    const t=e.changedTouches[0];
    const x=(t.clientX-r.left)/r.width*W,y=(t.clientY-r.top)/r.height*H;
    const dx=x-_tapStart.x,dy=y-_tapStart.y;
    if(Math.hypot(dx,dy)<TAP_THRESHOLD){
      tapX=x;tapY=y;tapped=true;
    }
  }
  if(e.touches.length<2){
    // Pinch ended (could be transitioning to 1 finger or to 0).
    // Reset pinch tracking. The remaining finger (if any) is NOT promoted
    // to a tap or pan — user has to lift fully and tap fresh.
    _pinchStartDist=0;_pinchStartMid=null;_pinchStartWorld=null;
  }
  if(e.touches.length===0){_tapStart=null;_onePanLast=null;}
});

C.addEventListener('touchcancel',()=>{
  // Phone call interrupt, gesture timeout, etc — drop everything cleanly.
  _pinchStartDist=0;_pinchStartMid=null;_pinchStartWorld=null;_tapStart=null;_onePanLast=null;
});

function haptic(ms){try{navigator.vibrate(ms)}catch(e){}}

// ================================================================
//  GAME STATE
// ================================================================
// Parse JSON from localStorage, fall back to {} if missing or corrupted —
// hand-edited or partially-written values would otherwise crash app startup.
function _safeJSON(k){try{return JSON.parse(localStorage.getItem(k)||'{}')}catch(e){return {}}}
// Guard against Safari Private Browsing (setItem throws QuotaExceededError),
// disk full, or any other localStorage failure. We'd rather lose a save than
// crash the running game. Used everywhere instead of bare localStorage.setItem.
function _safeSet(k,v){try{localStorage.setItem(k,String(v))}catch(e){}}
let S='menu'; // menu|play|complete|levels|settings|daily|challenge
let level=+localStorage.getItem('ae_level')||1;
let FORCE_FRESH_LEVELS=false; // QA flag: bypass levels-baked.js with ?fresh=1
let ALLOW_DOT_FILL=false; // QA flag: ?dots=1 restores 1-cell filler arrows
let CHAIN_MODE=true; // Variant D enabled by default; ?chains=0 to disable
let CLUSTERS_MODE=true; // Variant E enabled by default; ?clusters=0 to disable
let _clusterCenters=[]; // Set per-level by generateLevel; read by tryBuildArrow
let _maxBlockers=1;     // Late-level chain depth — set per-level, read by tryBuildArrow
let _levelPattern=null; // Set per-level by generateLevel; read by tryBuildArrow

// Visual level patterns. They only bias where arrows grow; escape rules,
// blocker limits, chain dependencies and solvability stay unchanged.
const LEVEL_PATTERNS=[
  {id:'braid',name:'Classic braid',lenScale:1,clusterScale:1,longMinScale:1},
  {id:'spiral',name:'Spiral coil',lenScale:1.08,clusterScale:1.15,longMinScale:1.04},
  {id:'mosaic',name:'Mosaic tiles',lenScale:.62,clusterScale:1.75,longMinScale:.72},
  {id:'piton',name:'Big pitons',lenScale:1.38,clusterScale:.45,longMinScale:1.28},
  {id:'diagonal',name:'Diagonal weave',lenScale:1.04,clusterScale:1.15,longMinScale:1},
  {id:'rings',name:'Concentric rings',lenScale:1.1,clusterScale:1.25,longMinScale:1.04},
  {id:'maze',name:'Maze rows',lenScale:.92,clusterScale:1.35,longMinScale:.9},
  {id:'rays',name:'Center rays',lenScale:1.02,clusterScale:1.2,longMinScale:1}
];

function getLevelPattern(lvl){
  if(lvl<=3)return LEVEL_PATTERNS[0];
  return LEVEL_PATTERNS[Math.floor((lvl-4)/7)%LEVEL_PATTERNS.length];
}

function buildPatternCenters(pattern,rows,cols,numClusters,rng){
  const centers=[];
  const cR=(rows-1)/2,cC=(cols-1)/2;
  const maxRad=Math.max(2,Math.min(rows,cols)*.47);
  const push=(r,c)=>centers.push({
    r:Math.max(1,Math.min(rows-2,Math.round(r))),
    c:Math.max(1,Math.min(cols-2,Math.round(c)))
  });

  if(pattern.id==='spiral'){
    // Spiral: attractors crawl around the center with increasing radius.
    for(let i=0;i<numClusters;i++){
      const t=i/Math.max(1,numClusters-1);
      const a=t*Math.PI*5.4+rng()*.5;
      const rad=maxRad*(.12+.82*t);
      push(cR+Math.sin(a)*rad,cC+Math.cos(a)*rad);
    }
  }else if(pattern.id==='mosaic'){
    // Mosaic: evenly spaced anchors produce short repeated blocks.
    const bands=Math.max(2,Math.round(Math.sqrt(numClusters)));
    for(let r=0;r<bands&&centers.length<numClusters;r++){
      for(let c=0;c<bands&&centers.length<numClusters;c++){
        push((r+.5)/bands*rows,(c+.5)/bands*cols);
      }
    }
  }else if(pattern.id==='piton'){
    // Big pitons: few central anchors make dominant snakes per board.
    const n=Math.max(2,Math.round(numClusters*.45));
    for(let i=0;i<n;i++){
      const a=i/n*Math.PI*2+rng()*.45;
      const rad=maxRad*(.12+.26*rng());
      push(cR+Math.sin(a)*rad,cC+Math.cos(a)*rad);
    }
  }else if(pattern.id==='diagonal'){
    // Diagonal weave: alternating diagonal anchors across the grid.
    for(let i=0;i<numClusters;i++){
      const t=(i+.5)/numClusters;
      const flip=i%2===0;
      push(t*rows,flip?t*cols:(1-t)*cols);
    }
  }else if(pattern.id==='rings'){
    // Concentric rings: nested radius bands around the center.
    const ringCount=Math.max(2,Math.min(5,Math.round(Math.sqrt(numClusters))));
    for(let i=0;i<numClusters;i++){
      const ring=i%ringCount;
      const a=(i/ringCount)*Math.PI*.9+rng()*.35;
      const rad=maxRad*(.18+.75*(ring/(ringCount-1||1)));
      push(cR+Math.sin(a)*rad,cC+Math.cos(a)*rad);
    }
  }else if(pattern.id==='maze'){
    // Maze rows: alternating horizontal lanes like compact zigzag rows.
    for(let i=0;i<numClusters;i++){
      const row=(i+.5)/numClusters*rows;
      const c=(i%2===0)?.25*cols:.75*cols;
      push(row,c+(rng()-.5)*cols*.12);
    }
  }else if(pattern.id==='rays'){
    // Center rays: spoke anchors radiate from center to edges.
    const spokes=8;
    for(let i=0;i<numClusters;i++){
      const spoke=i%spokes;
      const a=spoke/spokes*Math.PI*2;
      const rad=maxRad*(.2+.72*((Math.floor(i/spokes)+1)/(Math.ceil(numClusters/spokes)+1)));
      push(cR+Math.sin(a)*rad,cC+Math.cos(a)*rad);
    }
  }else{
    for(let i=0;i<numClusters;i++){
      const baseR=floor((i+.5)/numClusters*rows);
      const baseC=floor((.3+.4*rng())*cols);
      push(baseR,baseC);
    }
  }
  return centers;
}

function patternCellBias(r,c,d,rows,cols,isHead){
  const pattern=_levelPattern;
  if(!pattern)return 0;
  const id=pattern.id;
  const cR=(rows-1)/2,cC=(cols-1)/2;
  const rr=r-cR,cc=c-cC;
  const rad=Math.sqrt(rr*rr+cc*cc);
  const maxRad=Math.max(1,Math.sqrt(cR*cR+cC*cC));
  let s=0;

  if(id==='spiral'){
    const a=Math.atan2(rr,cc);
    const spiral=(a+Math.PI)/(Math.PI*2)+rad/maxRad*1.65;
    s+=Math.cos(spiral*Math.PI*2)*1.8;
  }else if(id==='mosaic'){
    const tile=4;
    const nearR=Math.min(r%tile,tile-r%tile);
    const nearC=Math.min(c%tile,tile-c%tile);
    s+=(2.5-Math.min(nearR,nearC))*(isHead?1.5:.75);
  }else if(id==='piton'){
    s+=(1-rad/maxRad)*(isHead?5.5:2.2);
  }else if(id==='diagonal'){
    const band1=Math.abs((r/(rows-1||1))-(c/(cols-1||1)));
    const band2=Math.abs((r/(rows-1||1))-(1-c/(cols-1||1)));
    s+=(1-Math.min(band1,band2))*3.5;
    if((d===0||d===2)&&Math.abs(rr)>Math.abs(cc)*.65)s+=.9;
    if((d===1||d===3)&&Math.abs(cc)>Math.abs(rr)*.65)s+=.9;
  }else if(id==='rings'){
    const bands=4;
    const x=(rad/maxRad)*bands;
    const near=Math.abs(x-Math.round(x));
    s+=(.5-near)*5.2;
  }else if(id==='maze'){
    const rowBand=Math.abs((r%4)-1.5);
    s+=(1.5-rowBand)*1.8;
    if(d===0||d===2)s+=isHead?1.2:2.0;
  }else if(id==='rays'){
    const ang=Math.atan2(rr,cc);
    const spoke=Math.round(ang/(Math.PI/4))*(Math.PI/4);
    s+=Math.cos(ang-spoke)*2.8;
    if(isHead){
      const outward=(Math.abs(cc)>Math.abs(rr))?(cc>=0?0:2):(rr>=0?3:1);
      if(d===outward)s+=3.5;
    }
  }
  return s;
}
// QA flag: ?level=N in the URL jumps straight to that level so you can
// preview generator changes without playing through the early levels. Also
// unlocks all levels up to N in `maxLevel`. Doesn't persist to localStorage —
// just affects the current session. NOT in production index.html.
try{

    f.t+=dt;
    if(f.t>=f.dur){floaters.splice(i,1);continue}
    const p=f.t/f.dur;
    const alpha=p<.15?p/.15:(p>.75?(1-p)/.25:1);
    const offY=-p*56;
    X.save();
    X.globalAlpha=max(0,alpha);
    txtP(f.text,f.x,f.y+offY,17,f.col);
    X.restore();
  }
}

// Real AdMob integration via @capacitor-community/admob
// Per-platform ad unit IDs. iOS IDs are placeholders — Google's official test
// IDs that always serve a test ad. Replace with real iOS unit IDs from the
// AdMob console when ready (search for "REPLACE_IOS_" below).
const _isIOS=()=>typeof Capacitor!=='undefined'&&Capacitor.getPlatform&&Capacitor.getPlatform()==='ios';
const REWARDED_ID =()=>_isIOS()
  ? 'ca-app-pub-1164170950110129/3890476871'  /* iOS Rewarded — real */
  : 'ca-app-pub-1164170950110129/7243043308';  /* Android Rewarded — real */
const INTERSTITIAL_ID=()=>_isIOS()
  ? 'ca-app-pub-1164170950110129/8951231862'  /* iOS Interstitial — real */
  : 'ca-app-pub-1164170950110129/6672197661';  /* Android Interstitial — real */

let admobReady=false;
let _rewardedPrepared=false;
let _interstitialPrepared=false;
function _logAdErr(stage,e){
  try{localStorage.setItem('ae_admob_err',stage+': '+String((e&&e.message)||e));}catch(_){}
}
async function initAdMob(){
  try{
    if(typeof Capacitor==='undefined'||!Capacitor.Plugins.AdMob)return;
    const AdMob=Capacitor.Plugins.AdMob;
    // Defensive: if initAdMob() ever runs twice (resume-from-background flow,
    // future refactor, retry path) the listeners would stack and reward
    // callbacks would fire N times. Strip any prior listeners up front.
    try{await AdMob.removeAllListeners()}catch(_){}

    // On iOS: explicitly request ATT permission FIRST, BEFORE initializing AdMob.
    // Apple rejected v1.0 because the ATT prompt was missing. The plugin's
    // built-in `requestTrackingAuthorization: true` flag inside .initialize()
    // doesn't reliably show the prompt on iPadOS 26+. Calling the dedicated
    // method explicitly works, and we wait for the user response before init
    // so SDK telemetry never goes out before the user has answered.
    if(_isIOS()){
      try{
        const status=await AdMob.trackingAuthorizationStatus();
        if(status&&status.status==='notDetermined'){
          await AdMob.requestTrackingAuthorization();
        }
      }catch(e){/* method may not exist in older plugin versions — fall through */}
    }

    await AdMob.initialize({
      initializeForTesting:false,
      requestTrackingAuthorization:false  // already handled explicitly above
    });

    // CRITICAL: mark SDK ready as soon as initialize() succeeds. The PREVIOUS
    // build only flipped this flag after both prepareRewardVideoAd AND
    // prepareInterstitial succeeded — and on a fresh AdMob account or with
    // a transient "no fill" response, prepare throws → admobReady stays
    // false forever → showRewardedAd silently grants the reward without
    // ever attempting to show an ad. That's the bug shipped in 1.0.6.
    admobReady=true;

    // Prepare ads in the background. On failure we'll lazily re-prepare in
    // showRewardedAd / showInterstitialAd.
    AdMob.prepareRewardVideoAd({adId:REWARDED_ID(),isTesting:false})
      .then(()=>{_rewardedPrepared=true})
      .catch(e=>_logAdErr('prepareRewarded',e));
    AdMob.prepareInterstitial({adId:INTERSTITIAL_ID(),isTesting:false})
      .then(()=>{_interstitialPrepared=true})
      .catch(e=>_logAdErr('prepareInterstitial',e));

    // Listen for reward — fired after the user watches the full rewarded ad.
    AdMob.addListener('onRewardedVideoAdReward',()=>{
      if(adRewardCallback)adRewardCallback();
      adRewardCallback=null;
    });
    // Re-prepare after close. Also clear adRewardCallback — if the user
    // dismissed without earning the reward, the callback must NOT fire later.
    AdMob.addListener('onRewardedVideoAdDismissed',()=>{
      adRewardCallback=null;
      _rewardedPrepared=false;
      AdMob.prepareRewardVideoAd({adId:REWARDED_ID(),isTesting:false})
        .then(()=>{_rewardedPrepared=true}).catch(()=>{});
    });
    AdMob.addListener('onInterstitialAdDismissed',()=>{
      _interstitialPrepared=false;
      AdMob.prepareInterstitial({adId:INTERSTITIAL_ID(),isTesting:false})
        .then(()=>{_interstitialPrepared=true}).catch(()=>{});
    });
  }catch(e){_logAdErr('init',e)}
}

  setTimeout(initAdMob,1500);

let _adInFlight=false;
async function showRewardedAd(onReward){
  // Browser / no plugin — give reward immediately so dev/web testing works.
  // On a REAL device with admobReady=false, we now refuse instead of granting
  // the reward, so users can't farm coins by tapping when ads are down.
  if(typeof Capacitor==='undefined'||!Capacitor.Plugins.AdMob){
    if(onReward)onReward();
    return;
  }
  if(!admobReady){
    // SDK init didn't complete (rare). Tell user, don't grant.
    spawnFloater(W/2,H/2,t('adUnavailable'),TH.arrowBlock);
    return;
  }
  // Anti-double-tap: spammy taps on the rewarded button used to register
  // multiple concurrent showRewardedAd calls → multiple rewards on a single
  // ad view. Block while one ad is mid-flight.
  if(_adInFlight)return;
  _adInFlight=true;
  const AdMob=Capacitor.Plugins.AdMob;
  // Wrap the caller's reward in a one-shot so even if dismiss + reward
  // listeners both fire, the player only gets one payout.
  let rewardFired=false;
  const safeReward=()=>{if(rewardFired)return;rewardFired=true;if(onReward)onReward()};
  adRewardCallback=safeReward;
  try{
    if(!_rewardedPrepared){
      await AdMob.prepareRewardVideoAd({adId:REWARDED_ID(),isTesting:false});
      _rewardedPrepared=true;
    }
    await AdMob.showRewardVideoAd();
    // Reward / dismiss listeners take it from here.
  }catch(e){
    _logAdErr('showRewarded',e);
    // Try ONE on-demand prepare+show retry — e.g., the cached ad expired.
    try{
      await AdMob.prepareRewardVideoAd({adId:REWARDED_ID(),isTesting:false});
      _rewardedPrepared=true;
      await AdMob.showRewardVideoAd();
    }catch(e2){
      _logAdErr('showRewardedRetry',e2);
      // Genuinely no ad available — DO NOT grant reward (anti-farm). Tell
      // the user instead. Clear the pending callback so a future ad's
      // listener doesn't fire it.
      adRewardCallback=null;
      spawnFloater(W/2,H/2,t('adUnavailable'),TH.arrowBlock);
    }
  }finally{
    // Released after the ad closes (catch path) OR on the next tick after
    // showRewardVideoAd resolves — the dismiss listener runs separately so
    // we release the gate immediately. Worst case a second ad starts while
    // the first is still on screen, but iOS only ever shows one at a time.
    _adInFlight=false;
  }
}
async function showInterstitialAd(){
  if(adsRemoved)return;
  const now=gt;
  if(now-lastInterstitialTime<INTERSTITIAL_INTERVAL)return;
  lastInterstitialTime=now;
  if(!admobReady||typeof Capacitor==='undefined'||!Capacitor.Plugins.AdMob)return;
  const AdMob=Capacitor.Plugins.AdMob;
  try{
    if(!_interstitialPrepared){
      await AdMob.prepareInterstitial({adId:INTERSTITIAL_ID(),isTesting:false});
      _interstitialPrepared=true;
    }
    await AdMob.showInterstitial();
  }catch(e){
    _logAdErr('showInterstitial',e);
    // Don't retry interstitials — they're noisy and timed; just skip this slot.
  }
}

// ================================================================
//  LEVEL GENERATION
// ================================================================
function seededRandom(seed){
  let s=seed;
  return function(){s=(s*16807)%2147483647;return(s-1)/2147483646};
}

// Generate a level using the REAL mechanic: arrows are multi-cell random-walk paths.
// Solvability is guaranteed by placing arrows in REVERSE solve order:
//   arrow[0] will be removed first, arrow[N-1] last. Place them backward:
//   first place arrow[N-1] (unconstrained), then arrow[N-2] needs a clear escape
//   past arrow[N-1], etc. At solve time, each arrow's escape path is clear of
//   the arrows that haven't been removed yet.
function generateLevel(lvl,customSeed){
  const rng=seededRandom(customSeed!=null?customSeed:(lvl*7919+31337));
  hintArrow=-1;hintTime=0;wrongTapsInLevel=0;
  hintUsedThisLevel=false;
  levelRevealT=0;
  // Reset pinch/pan state — every new level starts at the default 1× zoom
  // so the player isn't stuck inside a tight zoom from the previous level.
  zoomLevel=1;panX=0;panY=0;_pinchStartDist=0;_panStart=null;
  updateStreak();

  // Baked-level fast path: levels 1..200 (regular play only — daily/weekly
  // pass customSeed and stay procedural). The pre-built layout was scored
  // and selected for tangledness during the bake, so every player sees the
  // same puzzle for the same level number.
  // Braid mode forces fresh procedural — baked levels were produced without
  // body-overlap and would not show the new mechanic.
  if(!FORCE_FRESH_LEVELS&&customSeed==null&&lvl>=1&&lvl<=500&&typeof window!=='undefined'&&window.BAKED_LEVELS){
    const baked=window.BAKED_LEVELS[lvl-1];
    if(baked){
      gridCols=baked.cols;gridRows=baked.rows;
      arrows=baked.arrows.map(a=>({cells:a.c.map(c=>[c[0],c[1]]),dir:a.d,alive:true}));
      minMoves=arrows.length;
      moves=0;timer=0;undosLeft=3;
      const key='ae_best_'+lvl;
      bestTime=+localStorage.getItem(key)||0;
      return;
    }
  }

  // Difficulty curve. Power-0.8 early ramp + cap at lvl 150. The previous
  // 26×34 grid looked sparse once 1-cell dots were removed. Competitor boards
  // read denser on mobile: fewer cells, thicker visible strands, less blank
  // background. Max grid is now 22×30.
  // coexisting, not one giant Warnsdorff snake. This generator therefore
  // rejects short "successful" paths during the main pass: if an arrow
  // cannot grow into a proper snake, we try another head/direction instead
  // of accepting a 2-cell scrap.
  // Slightly steeper than before: ramp caps at lvl 120 instead of 150 so
  // each 10-level block is felt; user feedback at lvl 67 said "more or
  // less normal now, just a touch harder per step" so we bring the max
  // grid (22×30) closer in by ~20%.
  const p=min(1,Math.pow((lvl-1)/74,.66));
  // Grid 1.5× finer per user feedback: arrows need more cells to weave
  // INTO each other's pockets. Was 10×13 → 22×30; now 14×19 → 32×42.
  // Each cell on screen is ~33% smaller, so snakes look denser without
  // the arrow-stroke disappearing.
  const cols=floor(lrp(14,32,p)+.5);
  const rows=floor(lrp(19,42,p)+.5);
  const pattern=getLevelPattern(lvl);
  _levelPattern=pattern;
  const minLen=2;
  const maxLen=floor(lrp(25,108,p)*pattern.lenScale+.5);

  gridCols=cols;gridRows=rows;

  // Late-level scaling: once `p` saturates at lvl 75 the grid + length
  // are maxed out. Difficulty keeps climbing via TWO levers:
  //   • numClusters: 3 → 12 over lvls 75..1500, then +1 every 25 lvls
  //     (more cluster centers = more islands competing for the same
  //     snake heads = tighter corridors between them)
  //   • lateExtra: 0..1 over the same range — used below to scale
  //     longMin DOWN at high levels (shorter required min length =
  //     more arrows per board = more to track per tap)
  _maxBlockers=1;
  let numClusters, lateExtra;
  if(lvl<=1500){
    const q=Math.max(0,(lvl-75)/1425);
    numClusters=floor(lrp(3,12,q)+.5);
    lateExtra=q;
  }else{
    numClusters=12+floor((lvl-1500)/25);
    lateExtra=1+(lvl-1500)/2000;
  }
  numClusters=Math.min(24,numClusters);
  lateExtra=Math.min(2.5,lateExtra);

  // Pattern centers: same cluster mechanic, different attractor layouts.
  // This is the visual variety layer (spiral, mosaic, pitons, diagonals,
  // rings, maze rows, rays). It changes where arrows prefer to grow, not
  // the solve rules.
  _clusterCenters=[];
  if(CLUSTERS_MODE){
    numClusters=Math.max(2,Math.round(numClusters*pattern.clusterScale));
    _clusterCenters=buildPatternCenters(pattern,rows,cols,numClusters,rng);
  }

  // occ[r][c] = arrow index that owns this cell, or -1
  const occ=[];
  for(let r=0;r<rows;r++){occ[r]=[];for(let c=0;c<cols;c++)occ[r][c]=-1}

  const placed=[];

  // ONE-PASS GENERATION: drop the old medium-gap pass — it was
  // visual noise between headline snakes. Each placed arrow is now a
  // substantial winding path the player can read end-to-end. Empty
  // cells get absorbed into snakes by Pass 3 below.
  // longMin shrinks at very late levels (lateExtra > 0) — gives MORE
  // arrows per board at lvl 1500+ so there's more to track even
  // though the grid stays maxed.
  let safety=3000;
  const longMinBase=floor(maxLen*lrp(.55,.70,p)*pattern.longMinScale);
  const longMin=max(15,floor(longMinBase*max(0.45,1-lateExtra*0.30)));
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,minLen,maxLen,placed,{minAcceptLen:longMin});
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }

  // Pass 3: full-coverage absorption. Goal — eliminate the "scattered
  // single-cell dot" look the user complained about and fill empty cells
  // in the middle of the grid.
  //
  // Three sub-passes, each runs in a fixpoint loop so cascading absorption
  // fills chains of cells:
  //   3a. TAIL extension — empty cell adjacent to an arrow's tail joins
  //       that arrow's body (existing logic).
  //   3b. HEAD extension along escape line — the arrow's head consumes
  //       the cell immediately in front of it (which used to be on its
  //       escape line). This shortens the escape but keeps it valid.
  //   3c. 1-cell merge — leftover empty cells get a 1-cell arrow placed,
  //       then those 1-cell arrows get merged into adjacent multi-cell
  //       arrow tails wherever geometrically and game-logically valid.
  //
  // Every extension is gated by `_wouldBlockOtherEscape()` — adding a cell
  // to arrow A's body must not put it on the escape line of any arrow B
  // that was placed AFTER A. (B is solved before A in game order, so at
  // B's turn A is still alive and would block B's escape.)

  // Returns true iff (r,c) lies on the escape line of any arrow placed
  // after `currentIdx`. Those arrows solve before `currentIdx` in game,
  // so adding (r,c) to currentIdx's body would make them unreachable.
  const _wouldBlockOtherEscape=(r,c,currentIdx)=>{
    for(let j=currentIdx+1;j<placed.length;j++){
      const o=placed[j];
      const h=o.cells[o.cells.length-1];
      if(onEscapeLine(r,c,h[0],h[1],o.dir))return true;
    }
    return false;
  };

  // 3a. TAIL extension into empties.
  let absorbed=1;
  while(absorbed>0){
    absorbed=0;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(occ[r][c]!==-1)continue;
        for(let d=0;d<4;d++){
          const nr=r+DY[d],nc=c+DX[d];
          if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
          if(occ[nr][nc]===-1)continue;
          const arrowIdx=occ[nr][nc];
          const arrow=placed[arrowIdx];
          const tail=arrow.cells[0];
          if(tail[0]!==nr||tail[1]!==nc)continue;
          const head=arrow.cells[arrow.cells.length-1];
          if(onEscapeLine(r,c,head[0],head[1],arrow.dir))continue;
          if(_wouldBlockOtherEscape(r,c,arrowIdx))continue;
          arrow.cells.unshift([r,c]);
          occ[r][c]=arrowIdx;
          absorbed++;
          break;
        }
      }
    }
  }

  // 3b. HEAD extension along escape line. The cell directly in front of
  // each arrow's head is empty by construction (escape line check). We
  // pull that cell into the body, advancing the head one step toward the
  // grid edge. New escape line is shorter by one cell but still valid.
  let extended=1;
  while(extended>0){
    extended=0;
    for(let i=0;i<placed.length;i++){
      const a=placed[i];
      if(a.cells.length===1)continue; // 1-cell heads are absorbed via 3c
      const head=a.cells[a.cells.length-1];
      const fr=head[0]+DY[a.dir],fc=head[1]+DX[a.dir];
      if(fr<0||fr>=rows||fc<0||fc>=cols)continue; // already at edge
      if(occ[fr][fc]!==-1)continue; // not empty (shouldn't happen)
      if(_wouldBlockOtherEscape(fr,fc,i))continue;
      a.cells.push([fr,fc]);
      occ[fr][fc]=i;
      extended++;
    }
  }

  // 3c. Final small gap pass. We first try 3-8 cell arrows, then 2-5 cell
  // arrows. Single-cell arrows are disabled by default — visually a rare
  // empty cell reads better than a field of tiny arrow dots. Internal QA can
  // pass ?dots=1 to compare the old full-coverage behaviour.
  safety=3000;
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,3,8,placed,{minAcceptLen:3,braid:false});
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }
  safety=3000;
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,2,5,placed,{minAcceptLen:2,braid:false});
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }

  // Dense fill pass: after the main snakes are placed, keep trying modest
  // 2-4 cell arrows until no legal gap remains. This is intentionally not
  // "braidy"; its job is to remove empty holes without creating 1-cell dots.
  safety=5000;
  while(safety-->0){
    const arrow=tryBuildArrow(occ,rows,cols,rng,2,4,placed,{minAcceptLen:2,braid:false});
    if(!arrow)break;
    for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
    placed.push(arrow);
  }

  // Re-run absorption after the small gap passes. Those newly placed 2-8
  // cell arrows create fresh tails and fresh head escape-front cells, so a
  // second sweep can consume many cells that would otherwise become 1-cell
  // dots.
  absorbed=1;
  while(absorbed>0){
    absorbed=0;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(occ[r][c]!==-1)continue;
        for(let d=0;d<4;d++){
          const nr=r+DY[d],nc=c+DX[d];
          if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
          if(occ[nr][nc]===-1)continue;
          const arrowIdx=occ[nr][nc];
          const arrow=placed[arrowIdx];
          const tail=arrow.cells[0];
          if(tail[0]!==nr||tail[1]!==nc)continue;
          const head=arrow.cells[arrow.cells.length-1];
          if(onEscapeLine(r,c,head[0],head[1],arrow.dir))continue;
          if(_wouldBlockOtherEscape(r,c,arrowIdx))continue;
          arrow.cells.unshift([r,c]);
          occ[r][c]=arrowIdx;
          absorbed++;
          break;
        }
      }
    }
  }
  extended=1;
  while(extended>0){
    extended=0;
    for(let i=0;i<placed.length;i++){
      const a=placed[i];
      if(a.cells.length===1)continue;
      const head=a.cells[a.cells.length-1];
      const fr=head[0]+DY[a.dir],fc=head[1]+DX[a.dir];
      if(fr<0||fr>=rows||fc<0||fc>=cols)continue;
      if(occ[fr][fc]!==-1)continue;
      if(_wouldBlockOtherEscape(fr,fc,i))continue;
      a.cells.push([fr,fc]);
      occ[fr][fc]=i;
      extended++;
    }
  }

  // 3d. Internal detours. If a straight segment has two empty cells beside
  // it, route the same arrow through those cells:
  //   A--B becomes A--sideA--sideB--B
  // This fills holes by making existing arrows more snake-like instead of
  // creating separate tiny arrows.
  let detoured=1;
  // Per-arrow detour budget: capped at 12% of original segments + 70%
  // skip rate, so ~3-4% of segments get detoured (was ~32%). User
  // explicitly asked for 80% LESS internal zigzag — the tight back-and-
  // forth bumps that made every snake coil around itself instead of
  // weaving past neighbours. Natural turns from Pass-1 growth survive
  // because they come from the seed walk, not this pass.
  const _detourBudget=new Array(placed.length);
  for(let i=0;i<placed.length;i++){
    _detourBudget[i]=Math.max(0, Math.floor((placed[i].cells.length-1)*0.12));
  }
  while(detoured>0){
    detoured=0;
    for(let i=0;i<placed.length;i++){
      const a=placed[i];
      if(a.cells.length<2)continue;
      if(_detourBudget[i]<=0)continue;
      // BUG FIX: detour cannot touch the LAST segment (k = cells.length-2).
      // The last segment cells[N-2]→cells[N-1] must be in arrow.dir so the
      // arrowhead glyph (which is tangent to the last segment) points the
      // direction the arrow will actually escape. A detour at the last
      // segment routes the path sideways and breaks that invariant — the
      // player taps an arrow that visually points UP and it flies LEFT.
      for(let k=0;k<a.cells.length-2;k++){
        // Skip ~70% of segments randomly. Combined with the 12% budget
        // above, this leaves only the rare detour where it most helps
        // chain crossing — most arrows pass through with their natural
        // walk-grown turns intact.
        if(rng()<0.70)continue;
        const p0=a.cells[k],p1=a.cells[k+1];
        const dr=p1[0]-p0[0],dc=p1[1]-p0[1];
        const sides=(dr!==0)?[[0,1],[0,-1]]:[[1,0],[-1,0]];
        let did=false;
        for(const[sr,sc] of sides){
          const r0=p0[0]+sr,c0=p0[1]+sc;
          const r1=p1[0]+sr,c1=p1[1]+sc;
          if(r0<0||r0>=rows||c0<0||c0>=cols)continue;
          if(r1<0||r1>=rows||c1<0||c1>=cols)continue;
          if(occ[r0][c0]!==-1||occ[r1][c1]!==-1)continue;
          const head=a.cells[a.cells.length-1];
          if(onEscapeLine(r0,c0,head[0],head[1],a.dir))continue;
          if(onEscapeLine(r1,c1,head[0],head[1],a.dir))continue;
          if(_wouldBlockOtherEscape(r0,c0,i)||_wouldBlockOtherEscape(r1,c1,i))continue;
          a.cells.splice(k+1,0,[r0,c0],[r1,c1]);
          occ[r0][c0]=i;occ[r1][c1]=i;
          detoured++;
          _detourBudget[i]--;
          did=true;
          break;
        }
        if(did)break;
      }
    }
  }

  if(ALLOW_DOT_FILL){
    safety=3000;
    while(safety-->0){
      const arrow=tryBuildArrow(occ,rows,cols,rng,1,1,placed);
      if(!arrow)break;
      for(const[r,c] of arrow.cells)occ[r][c]=placed.length;
      placed.push(arrow);
    }
  }
  let merged=1;
  while(merged>0){
    merged=0;
    for(let i=placed.length-1;i>=0;i--){
      const a=placed[i];
      if(a.cells.length!==1)continue;
      const ar=a.cells[0][0],ac=a.cells[0][1];
      for(let d=0;d<4;d++){
        const nr=ar+DY[d],nc=ac+DX[d];
        if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
        if(occ[nr][nc]===-1)continue;
        const otherIdx=occ[nr][nc];
        if(otherIdx===i)continue;
        const other=placed[otherIdx];
        if(other.cells.length<2)continue;
        const tail=other.cells[0];
        if(tail[0]!==nr||tail[1]!==nc)continue;
        const head=other.cells[other.cells.length-1];
        if(onEscapeLine(ar,ac,head[0],head[1],other.dir))continue;
        if(_wouldBlockOtherEscape(ar,ac,otherIdx))continue;
        other.cells.unshift([ar,ac]);
        occ[ar][ac]=otherIdx;
        placed.splice(i,1);
        // Re-index occ — every cell whose value > i decrements by 1
        for(let r2=0;r2<rows;r2++){
          for(let c2=0;c2<cols;c2++){
            if(occ[r2][c2]>i)occ[r2][c2]--;
          }
        }
        merged++;
        break;
      }
    }
  }

  // Solvability check: simulate "tap an arrow whose escape is clear" until
  // all are removed. If we get stuck, the seed produced a deadlock (cycle
  // in the chain dependency graph) — retry with a different seed.
  // BUG FIX: previously this retry only ran when customSeed==null, but
  // the recursive call ALWAYS passes a customSeed for the perturbed
  // seed — so it never recursed past depth 1. Track depth in arguments[2]
  // independent of customSeed so we get the full 5 retries we intended.
  const _retryDepth=arguments.length>=3?arguments[2]:0;
  if(!_isLevelSolvable(placed,rows,cols)&&_retryDepth<5&&lvl>=1){
    const baseSeed=customSeed!=null?customSeed:(lvl*7919+31337);
    return generateLevel(lvl,baseSeed+97*(_retryDepth+1),_retryDepth+1);
  }

  // Reverse so arrows[0] = first solved
  arrows=placed.reverse();
  for(const a of arrows)a.alive=true;

  minMoves=arrows.length;
  moves=0;
  timer=0;
  undosLeft=3;

  const key='ae_best_'+lvl;
  bestTime=+localStorage.getItem(key)||0;
}

// Build the "primary snake" — one long winding arrow covering ~half of the
// grid via Warnsdorff's heuristic (move to the unvisited neighbour with
// fewest onward unvisited neighbours). The arrow head ends up on a grid
// edge so the escape line is outside the grid (automatic clear). The body
// trails through the interior in a snake pattern.
function buildPrimaryArrow(occ,rows,cols,rng){
  // Collect free edge cells; pick a random one as the HEAD (the cell the
  // player taps; arrow flies outward from there).
  const edges=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(occ[r][c]!==-1)continue;
      if(r===0||r===rows-1||c===0||c===cols-1)edges.push({r,c});
    }
  }
  if(!edges.length)return null;
  const start=edges[Math.floor(rng()*edges.length)];

  // Determine head's escape direction (outward from edge). For corner
  // cells either of two outward directions is valid — pick one.
  // DX=[1,0,-1,0], DY=[0,-1,0,1]  (right, up, left, down)
  let dir;
  if(start.r===0)dir=1;       // top edge → up
  else if(start.r===rows-1)dir=3; // bottom → down
  else if(start.c===0)dir=2;  // left → left
  else dir=0;                  // right → right

  // Warnsdorff fill from head inward.
  const path=[[start.r,start.c]];
  const visited=new Set();
  visited.add(start.r+','+start.c);
  // Aim for ~30% of cells. Higher fractions choke the filler passes —
  // the snake winds through every row/column, so other arrows can't
  // place an escape line that doesn't cross it, and the level ends up
  // as one solo snake (not playable). Floor at 8.
  const freeCells=rows*cols;
  const targetLen=Math.max(8,Math.floor(freeCells*.3));

  let curR=start.r,curC=start.c;
  while(path.length<targetLen){
    const opts=[];
    for(let d=0;d<4;d++){
      const nr=curR+DY[d],nc=curC+DX[d];
      if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
      if(occ[nr][nc]!==-1)continue;
      if(visited.has(nr+','+nc))continue;
      // Warnsdorff degree: count nr,nc's unvisited neighbours
      let deg=0;
      for(let dd=0;dd<4;dd++){
        const mr=nr+DY[dd],mc=nc+DX[dd];
        if(mr<0||mr>=rows||mc<0||mc>=cols)continue;
        if(occ[mr][mc]!==-1)continue;
        if(visited.has(mr+','+mc))continue;
        deg++;
      }
      opts.push({r:nr,c:nc,deg});
    }
    if(!opts.length)break;
    // Sort by degree ascending; tie-break with rng so different seeds
    // produce different paths even if degrees match.
    opts.sort((a,b)=>(a.deg-b.deg)||(rng()-.5));
    const pick=opts[0];
    path.push([pick.r,pick.c]);
    visited.add(pick.r+','+pick.c);
    curR=pick.r;curC=pick.c;
  }

  if(path.length<8)return null;

  // arrow.cells convention: cells[0]=tail, cells[N-1]=head. We grew from
  // head outward, so reverse.
  const cells=path.reverse();
  return {cells,dir};
}

// Build one arrow by EXHAUSTIVE candidate search.
// Special case: when minLen==1 && maxLen==1, build a single-cell arrow (just a
// head with a direction). Used in the gap-fill pass to plug isolated empties.
// `placed` (optional) is the array of arrows already placed — used for
// direction-variance penalty (#6: discourage clusters of same-direction
// arrows so the puzzle isn't solvable by "tap everything pointing east").
function tryBuildArrow(occ,rows,cols,rng,minLen,maxLen,placed,opts){
  opts=opts||{};
  const oneCell=(minLen===1&&maxLen===1);
  const minAcceptLen=opts.minAcceptLen||minLen;
  const braidMode=opts.braid!==false;
  const candidates=[];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(occ[r][c]!==-1)continue;
      for(let d=0;d<4;d++){
        // For multi-cell arrows we need a free cell behind the head too.
        if(!oneCell){
          const bd=(d+2)%4;
          const br=r+DY[bd],bc=c+DX[bd];
          if(br<0||br>=rows||bc<0||bc>=cols)continue;
          if(occ[br][bc]!==-1)continue;
        }
        // Escape line from head to grid edge. Allow up to 1 blocker — a
        // body cell of another arrow on this line creates a chain
        // dependency (tap blocker first, then this arrow flies). The
        // game's canEscape() already enforces this rule, so the
        // generator can use it as a placement-quality lever. Hard cap
        // at 1 keeps deadlock risk low; isLevelSolvable() at the end
        // verifies any seed before we ship it.
        let blockerCount=0;
        let escLen=0;
        let cr=r+DY[d],cc=c+DX[d];
        while(cr>=0&&cr<rows&&cc>=0&&cc<cols){
          if(occ[cr][cc]!==-1)blockerCount++;
          escLen++;
          cr+=DY[d];cc+=DX[d];
        }
        if(blockerCount>_maxBlockers)continue;
        // Score:
        //   +4.0 per neighbor already occupied → new arrows start attached to
        //        existing strands instead of spawning as separate islands.
        //   +2.0 per unique adjacent arrow → heads prefer busy knots, not just
        //        one flat parallel side.
        //   -2.0 if neighbor arrow has the SAME escape direction (#6 direction
        //        variance — prevents "all arrows point east" clusters that the
        //        player can solve by tap-spamming in one axis)
        //   -0.12 × Chebyshev distance from center → seed the first arrow near
        //        the middle of the grid so the cluster has room to expand
        //        outward in all directions (prevents hollow-center effect)
        let s=rng();
        const adjArrows=new Set();
        for(let dd=0;dd<4;dd++){
          const nr=r+DY[dd],nc=c+DX[dd];
          if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&occ[nr][nc]!==-1){
            s+=braidMode?7.0:3.5;
            adjArrows.add(occ[nr][nc]);
            if(placed&&placed[occ[nr][nc]]&&placed[occ[nr][nc]].dir===d)s-=8.0;
          }
        }
        if(braidMode)s+=adjArrows.size*2.0;
        const cR=(rows-1)/2,cC=(cols-1)/2;
        const distCenter=max(abs(r-cR),abs(c-cC));
        s-=distCenter*.12;
        // Variant D — chain mode bonus: prefer heads with LONG escape lines.
        // Each cell on the line is potential blocker once a later arrow's
        // body lands there, which creates a dependency chain at game time.
        // Weight bumped 0.5 → 1.5 (v1.0.15 tuning): heads with the longest
        // exit corridor are now strongly preferred, so subsequent arrows
        // routinely have something meaningful to BLOCK.
        if(CHAIN_MODE)s+=escLen*4;
        // Real-puzzle bonus: prefer heads whose exit is blocked by exactly
        // one already placed arrow. Solvability filtering rejects cycles,
        // but this makes the generator actively build locks instead of
        // mostly independent snakes.
        if(CHAIN_MODE&&placed&&placed.length>4){
          if(blockerCount===1)s+=10;
          else s-=4;
        }
        // Direction-variance bonus: the level should have a healthy
        // mix of all four exit directions, otherwise the player can
        // spam-tap one column. Reward under-represented directions,
        // penalise the currently-most-common one.
        if(placed&&placed.length>3){
          const dirCounts=[0,0,0,0];
          for(const o of placed)dirCounts[o.dir]++;
          let minC=dirCounts[0],maxC=dirCounts[0];
          for(let dd=1;dd<4;dd++){
            if(dirCounts[dd]<minC)minC=dirCounts[dd];
            if(dirCounts[dd]>maxC)maxC=dirCounts[dd];
          }
          if(dirCounts[d]===minC&&maxC>minC)s+=7;
          else if(dirCounts[d]===maxC&&maxC>minC+1)s-=5;
        }
        // Variant E — clusters mode penalty: arrow heads far from any
        // cluster center get strongly docked, so heads gather around the
        // chosen island centers and leave empty corridors between them.
        if(CLUSTERS_MODE&&_clusterCenters.length){
          let minD=Infinity;
          for(const cc of _clusterCenters){
            const dd=max(abs(r-cc.r),abs(c-cc.c));
            if(dd<minD)minD=dd;
          }
          s-=minD*.5;
        }
        s+=patternCellBias(r,c,d,rows,cols,true);
        candidates.push({hr:r,hc:c,dir:d,s});
      }
    }
  }
  if(candidates.length===0)return null;
  candidates.sort((a,b)=>b.s-a.s);

  // Single-cell arrow shortcut: return the best candidate immediately
  if(oneCell){
    const best=candidates[0];
    return{cells:[[best.hr,best.hc]],dir:best.dir};
  }

  for(const cand of candidates){
    const{hr,hc,dir}=cand;
    const bd=(dir+2)%4;
    const br0=hr+DY[bd],bc0=hc+DX[bd];

    // Always target the maximum length. Growth stops naturally when all
    // neighbors are blocked, so short paths only happen in tight corners.
    const targetLen=maxLen;
    const cells=[[br0,bc0],[hr,hc]];
    const used=new Set();
    used.add(hr+','+hc);
    used.add(br0+','+bc0);
    let br=br0,bc=bc0;
    let lastStepDir=bd;
    let straightRun=1;
    let turnCount=0; // #4: count direction changes during growth

    while(cells.length<targetLen){
      const opts=[];
      for(let d=0;d<4;d++){
        const nr=br+DY[d],nc=bc+DX[d];
        if(nr<0||nr>=rows||nc<0||nc>=cols)continue;
        if(occ[nr][nc]!==-1)continue;
        if(used.has(nr+','+nc))continue;
        if(onEscapeLine(nr,nc,hr,hc,dir))continue;
        opts.push({r:nr,c:nc,d});
      }
      if(opts.length===0)break;
      // Hard cap: never extend a straight run past 2 cells. Without this,
      // arrows can grow long straight along the grid edge (no neighbors → no
      // proximity penalty) and the player solves the level by tapping the
      // outer ring in order. We physically refuse the option here.
      const filteredOpts=opts.filter(o=>!(o.d===lastStepDir&&straightRun>=2));
      const useOpts=filteredOpts.length?filteredOpts:opts; // fallback only if turn impossible
      const scored=useOpts.map(({r,c,d})=>{
        let s=rng();
        // Proximity bonus: high enough that later arrows weave through existing
        // strands instead of taking isolated open-space walks.
        let occupied=[false,false,false,false];
        const adjArrows=new Set();
        for(let dd=0;dd<4;dd++){
          const nr=r+DY[dd],nc=c+DX[dd];
          if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&occ[nr][nc]!==-1){
            s+=braidMode?6.0:4.0;
            occupied[dd]=true;
            adjArrows.add(occ[nr][nc]);
          }
        }
        if(braidMode)s+=adjArrows.size*1.8;
        // Sandwich bonus: occupied on OPPOSITE sides → path threads a corridor.
        // This is the "braid" signal: prefer cells that sit between strands.
        if(occupied[0]&&occupied[2])s+=braidMode?7.0:2.5;
        if(occupied[1]&&occupied[3])s+=braidMode?7.0:2.5;
        // Lane bonus: when moving horizontally, prefer having strands above or
        // below; when moving vertically, prefer strands left/right. It creates
        // long adjacent runs that read like woven ropes.
        if(braidMode&&(d===0||d===2)&&(occupied[1]||occupied[3]))s+=3.8;
        if(braidMode&&(d===1||d===3)&&(occupied[0]||occupied[2]))s+=3.8;
        // After a seed arrow exists, isolated cells are visually weak. Keep a
        // small escape hatch early in growth so the arrow can still leave a
        // pocket and become long, but otherwise pull it back into the knot.
        if(braidMode&&placed&&placed.length>0&&adjArrows.size===0&&cells.length>4)s-=3.0;
        // Turn bonus: dominant signal — every arrow should be twisty.
        // Was +1.6 (weaker than the +2.0 proximity bonus), so on the grid
        // edge with few neighbors arrows still grew straight. Bumped to
        // +3.0 so even an isolated arrow strongly prefers turning.
        if(d!==lastStepDir)s+=2.0;
        // Straight penalty: was -1.2, weak vs RNG noise. Now -3.5 — combined
        // with the hard cap above, straight runs of 3+ are statistically
        // rare and never hit the wall-hugging "tap outer ring" exploit.
        else if(straightRun>=2)s-=2.0;
        // Variant D — chain mode: STRONG bonus if this cell is on the escape
        // line of an already-placed arrow. That arrow solves AFTER this one
        // in game order; placing our body on its escape line means the player
        // can only solve it once we're removed → adds one link to the chain.
        if(CHAIN_MODE&&placed){
          let crossings=0;
          for(let j=0;j<placed.length;j++){
            const o=placed[j];
            const oh=o.cells[o.cells.length-1];
            if(onEscapeLine(r,c,oh[0],oh[1],o.dir))crossings++;
          }
          // Weight bumped 2.5 → 8 (v1.0.15 tuning). Crossing another
          // arrow's escape line is the single most-important property
          // for puzzle quality — every crossing translates to "tap A
          // before B" gameplay. With the previous 2.5 the bonus was
          // routinely outweighed by length / turn / center bonuses, so
          // arrows preferred isolated zigzag spirals to chain links.
          s+=crossings*20;
        }
        // Penetration bonus — body cells in TIGHT enclosed pockets get
        // a strong bonus. Counts how many of the 4 neighbours are walls
        // or already-placed body cells. ≥3 = the cell is inside a "U"
        // or "C" pocket of another arrow → exactly the empty interior
        // the user pointed out. Encourages snakes to wind INTO the
        // negative space of earlier-placed snakes instead of running
        // around them.
        let surroundedBy=0;
        for(let dd=0;dd<4;dd++){
          const nr2=r+DY[dd],nc2=c+DX[dd];
          if(nr2<0||nr2>=rows||nc2<0||nc2>=cols)surroundedBy++;
          else if(occ[nr2][nc2]!==-1)surroundedBy++;
        }
        if(surroundedBy>=3)s+=14;
        else if(surroundedBy>=2)s+=4;
        // Variant E — clusters mode: penalty for body cells far from nearest
        // cluster center, keeping the arrow inside its assigned island.
        if(CLUSTERS_MODE&&_clusterCenters.length){
          let minD=Infinity;
          for(const cc of _clusterCenters){
            const dd=max(abs(r-cc.r),abs(c-cc.c));
            if(dd<minD)minD=dd;
          }
          s-=minD*.4;
        }
        s+=patternCellBias(r,c,d,rows,cols,false);
        return{cell:[r,c],d,s};
      });
      scored.sort((a,b)=>b.s-a.s);
      const pick=scored[0];
      cells.unshift(pick.cell);
      used.add(pick.cell[0]+','+pick.cell[1]);
      br=pick.cell[0];bc=pick.cell[1];
      if(pick.d===lastStepDir)straightRun++;else{straightRun=1;lastStepDir=pick.d;turnCount++}
    }

    // #4 Min turn requirement: long arrows (>5 cells) must twist at least
    // twice. A 6-cell L-shape (1 turn) was visually flat and let the player
    // solve it by sliding their finger. Reject and try the next candidate.
    if(cells.length>5&&turnCount<2)continue;

    if(cells.length>=minAcceptLen)return{cells,dir};
  }
  return null;
}

// Is (r,c) on the escape line of an arrow with head (hr,hc) in direction dir?
function onEscapeLine(r,c,hr,hc,dir){
  let cr=hr+DY[dir],cc=hc+DX[dir];
  while(cr>=0&&cr<gridRows&&cc>=0&&cc<gridCols){
    if(cr===r&&cc===c)return true;
    cr+=DY[dir];cc+=DX[dir];
  }
  return false;
}

// Repeatedly find any arrow whose escape line has no alive blocker and
// "remove" it. If we reach zero arrows, the level is solvable. If we get
// stuck with arrows remaining, there's a cycle in the chain-dependency
// graph and the level is unwinnable — caller should regenerate.
function _isLevelSolvable(placed,rows,cols){
  const N=placed.length;
  const alive=new Array(N).fill(true);
  let removed=0;
  while(removed<N){
    let progress=false;
    for(let i=0;i<N;i++){
      if(!alive[i])continue;
      const head=placed[i].cells[placed[i].cells.length-1];
      const dir=placed[i].dir;
      let cr=head[0]+DY[dir],cc=head[1]+DX[dir];
      let clear=true;
      while(cr>=0&&cr<rows&&cc>=0&&cc<cols&&clear){
        for(let j=0;j<N;j++){
          if(j===i||!alive[j])continue;
          for(const[or,oc] of placed[j].cells){
            if(or===cr&&oc===cc){clear=false;break}
          }
          if(!clear)break;
        }
        cr+=DY[dir];cc+=DX[dir];
      }
      if(clear){alive[i]=false;removed++;progress=true;break}
    }
    if(!progress)return false;
  }
  return true;
}

// ================================================================
//  GAME ACTIONS
// ================================================================
// Check if arrow[idx] can escape — head cell walks in arrow.dir to grid edge,
// path must not contain cells of any OTHER alive arrow.
function canEscape(idx){
  const a=arrows[idx];
  if(!a||!a.alive)return false;
  const head=a.cells[a.cells.length-1];
  let cr=head[0]+DY[a.dir],cc=head[1]+DX[a.dir];
  while(cr>=0&&cr<gridRows&&cc>=0&&cc<gridCols){
    for(let j=0;j<arrows.length;j++){
      if(j===idx||!arrows[j].alive)continue;
      for(const[or,oc] of arrows[j].cells){
        if(or===cr&&oc===cc)return false;
      }
    }
    cr+=DY[a.dir];cc+=DX[a.dir];
  }
  return true;
}

// Compute total arc length of an arrow path in pixels (cell-center to cell-center).
// Single-cell arrows get a synthetic body length so the animation has something to render.
function arrowBodyLen(a,cs){
  if(a.cells.length===1)return cs*.38;
  let len=0;
  for(let i=0;i<a.cells.length-1;i++){
    const dr=a.cells[i+1][0]-a.cells[i][0];
    const dc=a.cells[i+1][1]-a.cells[i][1];
    len+=sqrt(dr*dr+dc*dc)*cs;
  }
  return len;
}

// Build world-space extended path for an arrow: polyline through cell centers +
// a long straight extension in the exit direction past the head.
// Single-cell arrows get a synthetic tail point behind the head in backDir.
function buildArrowWorldPath(a,cs,gx,gy){
  const pts=[];
  for(const[r,c] of a.cells)pts.push([gx+c*cs+cs/2,gy+r*cs+cs/2]);
  if(pts.length===1){
    const bd=(a.dir+2)%4;
    const h=pts[0];
    pts.unshift([h[0]+DX[bd]*cs*.38,h[1]+DY[bd]*cs*.38]);
  }
  const head=pts[pts.length-1];
  pts.push([head[0]+DX[a.dir]*1600,head[1]+DY[a.dir]*1600]);
  return pts;
}

function tapArrowByIndex(idx){
  // Guard: block taps during the brief transition window after game-over /
  // level-complete (a setTimeout flips state in 500ms). Without this, the
  // user can tap further arrows in those 500ms and corrupt the post-state.
  if(inputLocked)return;
  const a=arrows[idx];
  if(!a||!a.alive)return;

  if(canEscape(idx)){
    a.alive=false;
    moves++;

    const cs=getCellSize(),gx=getGridX(),gy=getGridY();
    const bodyLen=arrowBodyLen(a,cs);
    const extLen=1600;
    // Pre-build the polyline ONCE per anim (was rebuilt every frame in the
    // draw loop — main cause of lag during a chain of arrow exits).
    const path=buildArrowWorldPath(a,cs,gx,gy);
    anims.push({
      arrow:a,
      dir:a.dir,
      t:0,dur:1.2,
      col:arrowColor(a,idx),cs,gx,gy,
      bodyLen,totalDist:bodyLen+extLen,
      path,
    });
    sfx.swoosh(a.dir);haptic(10);

    // Win check
    let allGone=true;
    for(const ar of arrows)if(ar.alive){allGone=false;break}
    if(allGone){
      inputLocked=true;
      setTimeout(()=>{
        inputLocked=false;
        S='complete';
        sfx.complete();haptic(30);
        const s=max(1,undosLeft);
        const perfect=(s===3);
        let gained=0;
        if(isWeekly){
          if(!isWeeklyDone()){
            gained=WEEKLY_REWARD;
            _safeSet(weeklyDoneKey(),'1');
          }
        }else if(isDaily){
          if(!isDailyDone()){
            gained=DAILY_REWARD;
            _safeSet(dailyDoneKey(),'1');
            totalDailies++;
          }
        }else{
          const wasNewStars=(stars[level]||0)<s;
          stars[level]=max(stars[level]||0,s);
          totalStars=Object.values(stars).reduce((a,b)=>a+b,0);
          gained=5+s*5;
          const key='ae_best_'+level;
          const prev=+localStorage.getItem(key)||99999;
          if(timer<prev)_safeSet(key,floor(timer));
          bestTime=min(prev,floor(timer));
          if(undosLeft===3)streak++;else streak=0;
          if(wasNewStars&&perfect)totalPerfect++;
          if(wasNewStars&&!hintUsedThisLevel)noHintCount++;
          fastestLevel=min(fastestLevel,floor(timer));
        }
        coins+=gained;
        totalCoinsEarned+=gained;
        lastGained=gained;
        if(gained>0)spawnFloater(W/2,H*.58,'+'+gained);
        checkAchievements({
          level,stars:s,totalStars,streakDays,coins,perfect,isDaily,
          totalPerfect,totalDailies,noHintCount,fastestLevel
        });
        save();
        spawnConfetti();
      },400);
    }
  }else{
    // Blocked — shake the head cell, lose a heart (life)
    const cs=getCellSize(),gx=getGridX(),gy=getGridY();
    const head=a.cells[a.cells.length-1];
    const sx=gx+head[1]*cs+cs/2;
    const sy=gy+head[0]*cs+cs/2;
    shakeAnims.push({x:sx,y:sy,idx,t:0,dur:.2});
    sfx.blocked();haptic([5,30,5]);
    if(isTutorial()){
      // Tutorial mode (levels 1-TUTORIAL_LEVELS): wrong tap is a teaching
      // moment, not a punishment. Player sees the shake + blocked sfx,
      // then the highlighted next arrow re-pulses so they can try again.
      spawnFloater(sx,sy-cs*.6,'blocked',TH.arrowBlock);
    }else{
      undosLeft--;
      spawnFloater(sx,sy-cs*.6,'-1',TH.arrowBlock);
      if(undosLeft<=0){
        inputLocked=true;
        setTimeout(()=>{S='gameover';sfx.gameover();inputLocked=false},500);
      }
    }
  }
}

// First TUTORIAL_LEVELS regular levels are no-penalty teaching levels:
// wrong taps don't drain hearts and the next solvable arrow is always
// pulse-highlighted. Daily/weekly are excluded — those are challenges,
// not introductions.
const TUTORIAL_LEVELS=3;
function isTutorial(){
  return level<=TUTORIAL_LEVELS&&!isDaily&&!isWeekly;
}

function spawnConfetti(){
  confetti=[];
  if(reducedMotion)return; // celebration confetti is purely decorative
  const colors=[TH.accent,TH.success,TH.star,TH.warning,'#c468a0','#68b89c'];
  for(let i=0;i<35;i++){
    confetti.push({
      x:W/2+rnd(-80,80),y:H*.35+rnd(-20,20),

      col:colors[floor(rnd(0,colors.length))],
      life:1.5+rnd(0,1),shape:rnd()>.5?0:1 // 0=rect, 1=circle
    });
