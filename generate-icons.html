<!DOCTYPE html>
<html><body>
<h2>Click each button to download icons</h2>
<canvas id="c"></canvas>
<br><button onclick="gen(192)">Download 192px</button>
<button onclick="gen(512)">Download 512px</button>
<script>
function gen(sz){
  const c=document.getElementById('c');
  c.width=c.height=sz;
  const x=c.getContext('2d');
  // Rounded rect bg
  x.fillStyle='#5c7caa';
  x.beginPath();x.roundRect(0,0,sz,sz,sz*.18);x.fill();
  // Arrow path
  const m=sz/2,s=sz*.25;
  x.strokeStyle='#fff';x.lineWidth=sz*.06;x.lineCap='round';x.lineJoin='round';
  x.beginPath();
  x.moveTo(m-s,m+s*.4);x.lineTo(m-s,m-s*.6);x.lineTo(m+s*.4,m-s*.6);
  x.lineTo(m+s*.4,m);x.lineTo(m+s,m);
  x.stroke();
  // Arrowhead
  x.fillStyle='#fff';x.beginPath();
  x.moveTo(m+s+sz*.08,m);
  x.lineTo(m+s-sz*.04,m-sz*.08);
  x.lineTo(m+s-sz*.04,m+sz*.08);
  x.closePath();x.fill();
  // Download
  const a=document.createElement('a');
  a.download='icon-'+sz+'.png';
  a.href=c.toDataURL('image/png');
  a.click();
}
</script>
</body></html>
